---
- name: Escuchar eventos de JBoss/Java
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Evento de Heap Space detectado
      condition: event.payload.status == "OutOfMemory"
      action:
        run_job_template:
          name: "JBoss HelloWorld - OOM Reaction"
          organization: "Default"
          # Puedes pasar variables del webhook directamente al Job
          job_args:
            extra_vars:
              target_host: "{{ event.payload.host }}"
              reason: "Triggered by EDA Webhook"